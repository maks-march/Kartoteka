{% extends 'base.html' %}

{% block title %}Удаление системы{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger mt-5">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Подтверждение удаления
                    </h4>
                </div>
                <div class="card-body">
                    <p class="lead">Вы уверены, что хотите удалить систему?</p>
                    
                    <div class="alert alert-warning">
                        <strong>{{ object.name }}</strong><br>
                        <small class="text-muted">{{ object.get_system_class_display }}</small>
                    </div>
                    
                    <p class="text-danger">
                        <i class="fas fa-info-circle me-1"></i>
                        Это действие нельзя отменить!
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-2"></i>Удалить
                        </button>
                        <a href="{% url 'automated_system_detail' object.id %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Отмена
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}d
