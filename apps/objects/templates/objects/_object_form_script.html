<script id="parentAddresses" type="application/json">{{ parent_addresses|default:'{}'|safe }}</script>
<script>
(function() {
    const levelSelect = document.getElementById('levelSelect');
    if (!levelSelect) return;

    const parentInput = document.getElementById('selectedParentId');
    const ownerInput = document.getElementById('selectedOwnerEntityId');
    const titleInput = document.getElementById('titleInput');
    const licensorInput = document.getElementById('licensorInput');

    let parentAddresses = {};
    const paEl = document.getElementById('parentAddresses');
    try { parentAddresses = JSON.parse((paEl && paEl.textContent) || '{}'); } catch (e) { parentAddresses = {}; }

    // Полное скрытие группы поля, недоступного на текущем уровне: прячем блок
    // и очищаем/отключаем поле, чтобы оно не отправлялось в POST.
    function setFieldVisible(group, input, visible) {
        if (!group) return;
        group.style.display = visible ? '' : 'none';
        if (input) {
            input.disabled = !visible;
            if (!visible) input.value = '';
        }
    }

    function refresh() {
        const level = parseInt(levelSelect.value, 10);

        // Родитель — только для L2/L3 (у L1 родителя нет).
        setFieldVisible(document.getElementById('parentGroup'), parentInput, level !== 1);

        // Юр. лицо (владелец) — указывается только у L1; у L2/L3 наследуется.
        setFieldVisible(document.getElementById('ownerGroup'), ownerInput, level === 1);

        // Титульный номер — для L2 и L3.
        setFieldVisible(document.getElementById('titleGroup'), titleInput, level === 2 || level === 3);

        // Лицензиар — только для L3.
        setFieldVisible(document.getElementById('licensorGroup'), licensorInput, level === 3);
    }

    // Подстановка адреса родителя в пустые поля (с возможностью правок).
    function applyParentAddress() {
        if (!parentInput) return;
        const addr = parentAddresses[parentInput.value];
        if (!addr) return;
        document.querySelectorAll('.addr-field').forEach(function(field) {
            const key = field.getAttribute('data-addr');
            if (!field.value && addr[key]) field.value = addr[key];
        });
    }

    levelSelect.addEventListener('change', refresh);

    const parentPicker = document.getElementById('parentPicker');
    if (parentPicker) {
        parentPicker.addEventListener('click', function() { setTimeout(applyParentAddress, 0); });
    }

    refresh();
})();
</script>
