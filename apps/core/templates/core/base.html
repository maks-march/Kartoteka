<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Kartoteka{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/app.js' %}" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'hub' %}">Главная</a>
            <a href="{% url 'object-list' %}">Объекты</a>
            <a href="{% url 'system-list' %}">Системы</a>
            <a href="{% url 'category-list' %}">Категории</a>
            <a href="{% url 'owner-entity-list' %}">Юр. лица</a>
        </nav>
        <div class="user-menu">
            {% if user.is_authenticated %}
                <span>{{ user.username }}</span>
                <a href="{% url 'profile' %}" class="btn btn-secondary">Профиль</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary">Войти</a>
            {% endif %}
        </div>
    </header>

    {% block content %}{% endblock %}
</body>
</html>
