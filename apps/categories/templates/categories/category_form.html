{% extends 'core/base.html' %}

{% block title %}{% if category %}Изменить{% else %}Добавить{% endif %} категорию{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>{% if category %}Изменить{% else %}Добавить{% endif %} категорию</h1>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Название</label>
            <input type="text" name="category_name" value="{{ category.category_name|default:'' }}" required>
        </div>

        <div class="form-group">
            <label>Уровень</label>
            <select name="object_level" required>
                <option value="1" {% if category.object_level == 1 %}selected{% endif %}>Уровень 1</option>
                <option value="2" {% if category.object_level == 2 %}selected{% endif %}>Уровень 2</option>
                <option value="3" {% if category.object_level == 3 %}selected{% endif %}>Уровень 3</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'category-list' %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
