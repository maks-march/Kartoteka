{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить систему wide — test</title>
    <link rel="stylesheet" href="{% static 'css/styles_test.css' %}">
</head>
<body class="test-wide">
<header>
    <nav>
        <a href="/test">Тестовый стенд</a>
    </nav>
</header>

<div class="card form-card">
    <div class="page-title-row">
        <h1 style="margin:0">Добавить систему автоматизации</h1>
        <span class="hint">Широкая форма: поля сгруппированы в 4 колонки</span>
    </div>

    <form>
        <div class="form-section">
            <h2>Основная информация</h2>
            <div class="form-grid wide-grid">
                <div class="form-group" style="grid-column: span 2">
                    <label>Полное название системы автоматизации</label>
                    <input type="text" value="Siemens SIMATIC PCS 7 Process Control System">
                </div>
                <div class="form-group">
                    <label>Короткое название</label>
                    <input type="text" value="PCS 7">
                </div>
                <div class="form-group">
                    <label>Версия</label>
                    <input type="text" value="V9.1 SP2">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>Классификация, поставщик и состояние</h2>
            <div class="form-grid wide-grid">
                <div class="form-group">
                    <label>Класс системы</label>
                    <select><option selected>L2 — SCADA/DCS</option><option>L3 — MES</option><option>L4 — ERP</option></select>
                </div>
                <div class="form-group">
                    <label>Вендор</label>
                    <select><option selected>Siemens AG</option><option>Emerson Electric Co.</option><option>ООО «1С»</option></select>
                </div>
                <div class="form-group">
                    <label>Статус системы</label>
                    <select><option selected>В эксплуатации</option><option>Внедряется</option><option>Планируется</option><option>Не поддерживается</option></select>
                </div>
                <div class="form-group">
                    <label>Тип продукта</label>
                    <select><option selected>Программное обеспечение</option><option>Оборудование</option><option>Сервис</option></select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>Жизненный цикл</h2>
            <div class="form-grid wide-grid">
                <div class="form-group">
                    <label>Дата выпуска</label>
                    <input type="date" value="2021-05-20">
                </div>
                <div class="form-group">
                    <label>Конец поддержки</label>
                    <input type="date" value="2030-12-31">
                </div>
                <div class="form-group" style="grid-column: span 2">
                    <label>Примечание по жизненному циклу</label>
                    <input type="text" value="Поддержка продлевается отдельным сервисным соглашением.">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>Дополнительная информация</h2>
            <div class="form-group">
                <label>Примечания</label>
                <textarea>Используется как DCS/SCADA-платформа для технологических установок. Требует проверки совместимости с текущей версией инженерной станции.</textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-primary">Сохранить</button>
            <a href="/test/system-wide/" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
