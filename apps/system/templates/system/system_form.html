{% extends 'core/base.html' %}

{% block title %}{% if system %}Изменить{% else %}Добавить{% endif %} систему{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>{% if system %}Изменить{% else %}Добавить{% endif %} систему</h1>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Название системы</label>
            <input type="text" name="autosystem_name" value="{{ system.autosystem_name|default:'' }}" required>
        </div>

        <div class="form-group">
            <label>Класс системы</label>
            <select name="system_class" required>
                <option value="">— Выберите класс —</option>
                {% for cls in classes %}
                <option value="{{ cls.pk }}"
                    {% if system.system_class_id == cls.pk %}selected{% endif %}>
                    L{{ cls.level }} - {{ cls.system_class }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% if system %}{% url 'system-detail' system.pk %}{% else %}{% url 'system-list' %}{% endif %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
