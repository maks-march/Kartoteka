{% extends 'core/base.html' %}

{% block title %}{% if product %}Изменить{% else %}Добавить{% endif %} продукт{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>{% if product %}Изменить{% else %}Добавить{% endif %} продукт вендора</h1>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Название продукта</label>
            <input type="text" name="product_name" value="{{ product.product_name|default:'' }}" required>
        </div>

        <div class="form-group">
            <label>Вендор</label>
            <select name="vendor">
                <option value="">— Вендор не указан —</option>
                {% for v in vendors %}
                <option value="{{ v.pk }}" {% if product.vendor_id == v.pk %}selected{% endif %}>{{ v.entity_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% if product %}{% url 'product-detail' product.pk %}{% else %}{% url 'product-list' %}{% endif %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
